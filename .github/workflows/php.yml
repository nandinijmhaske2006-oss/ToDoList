name: PHP CI

on:
push:
branches: ["main"]
pull_request:
branches: ["main"]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up PHP
    uses: shivammathur/setup-php@v2
    with:
      php-version: '8.1'

  - name: Validate PHP syntax
    run: |
      find . -name "*.php" -print0 | xargs -0 -n1 php -l

  - name: Start MySQL service
    run: sudo systemctl start mysql

  - name: Create Database
    run: |
      mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS php_micro_project;"

  - name: Import Database Schema
    run: |
      mysql -u root -proot php_micro_project < setup_db.sql
```
