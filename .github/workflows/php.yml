printf "name: PHP CI\n\non:\n  push:\n    branches: [\"main\"]\n  pull_request:\n    branches: [\"main\"]\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n\n      - name: Set up PHP\n        uses: shivammathur/setup-php@v2\n        with:\n          php-version: '8.1'\n\n      - name: Validate PHP syntax\n        run: |\n          find . -name \"*.php\" -print0 | xargs -0 -n1 php -l\n" > .github/workflows/php.yml
